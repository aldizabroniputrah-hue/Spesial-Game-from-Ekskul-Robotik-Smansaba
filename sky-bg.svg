<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffea99"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="600" height="900" fill="url(#skyGrad)"/>
  <!-- Decorative clouds -->
  <g fill="rgba(255,255,255,0.5)">
    <circle cx="100" cy="150" r="40"/>
    <circle cx="140" cy="130" r="30"/>
    <circle cx="60"  cy="140" r="35"/>

    <circle cx="450" cy="280" r="45"/>
    <circle cx="500" cy="260" r="32"/>
    <circle cx="410" cy="270" r="38"/>

    <circle cx="200" cy="450" r="35"/>
    <circle cx="240" cy="435" r="25"/>
    <circle cx="165" cy="445" r="30"/>

    <circle cx="520" cy="600" r="50"/>
    <circle cx="575" cy="580" r="38"/>
    <circle cx="475" cy="595" r="42"/>
  </g>
  <!-- Stars -->
  <g fill="#FFD54F" opacity="0.7">
    <circle cx="80"  cy="50"  r="3"/>
    <circle cx="300" cy="80"  r="4"/>
    <circle cx="550" cy="30"  r="3"/>
    <circle cx="420" cy="120" r="2"/>
    <circle cx="170" cy="200" r="3"/>
    <circle cx="350" cy="350" r="2"/>
    <circle cx="50"  cy="400" r="3"/>
    <circle cx="580" cy="450" r="4"/>
  </g>
</svg>
